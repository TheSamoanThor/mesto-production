<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mesto</title>
  <script type="module" crossorigin src="./assets/index-de2QMxV3.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index-DQlhqpV9.css">
</head>
<body class="page">
  <div class="page__content">
    <header class="header page__section">
      <img src="./assets/logo-C_QQpFK1.svg" alt="Логотип проекта Место" class="logo header__logo" />
    </header>
    <main class="content">
      <section class="profile page__section">
        <div class="profile__image"></div>
        <div class="profile__info">
          <h1 class="profile__title"></h1>
          <button class="profile__edit-button" type="button"></button>
          <p class="profile__description"></p>
        </div>
        <button class="profile__add-button" type="button"></button>
      </section>
      <section class="places page__section">
        <ul class="places__list"></ul>
      </section>
    </main>
    <footer class="footer page__section">
      <p class="footer__copyright">&copy; 2025 Mesto Russia</p>
    </footer>

    <!-- Попап редактирования профиля -->
    <div class="popup popup_type_edit">
      <div class="popup__content">
        <button type="button" class="popup__close"></button>
        <h3 class="popup__title">Редактировать профиль</h3>
        <form class="popup__form" name="edit-profile" novalidate>
          <label class="popup__label">
            <input type="text" name="user-name" id="user-name" class="popup__input popup__input_type_name"
              placeholder="Имя" required minlength="2" maxlength="40"
              pattern="[A-Za-zА-Яа-яЁё\s\-]+"
              data-error-message="Разрешены только латинские, кириллические буквы, знаки дефиса и пробелы" />
          </label>
          <span class="popup__error" id="user-name-error"></span>

          <label class="popup__label">
            <input type="text" name="user-description" id="user-description" class="popup__input popup__input_type_description"
              placeholder="Занятие" required minlength="2" maxlength="200" />
          </label>
          <span class="popup__error" id="user-description-error"></span>

          <button type="submit" class="button popup__button popup__button_disabled" disabled>Сохранить</button>
        </form>
      </div>
    </div>

    <!-- Попап добавления карточки -->
    <div class="popup popup_type_new-card">
      <div class="popup__content">
        <button type="button" class="popup__close"></button>
        <h3 class="popup__title">Новое место</h3>
        <form class="popup__form" name="new-place" novalidate>
          <label class="popup__label">
            <input type="text" name="place-name" id="place-name" class="popup__input popup__input_type_card-name"
              placeholder="Название" required minlength="2" maxlength="30"
              pattern="[A-Za-zА-Яа-яЁё\s\-]+"
              data-error-message="Разрешены только латинские, кириллические буквы, знаки дефиса и пробелы" />
          </label>
          <span class="popup__error" id="place-name-error"></span>

          <label class="popup__label">
            <input type="url" name="place-link" id="place-link" class="popup__input popup__input_type_url"
              placeholder="Ссылка на картинку" required />
          </label>
          <span class="popup__error" id="place-link-error"></span>

          <button type="submit" class="button popup__button popup__button_disabled" disabled>Создать</button>
        </form>
      </div>
    </div>

    <!-- Попап с изображением -->
    <div class="popup popup_type_image">
      <div class="popup__content popup__content_content_image">
        <button type="button" class="popup__close"></button>
        <img src="#" alt="" class="popup__image" />
        <p class="popup__caption"></p>
      </div>
    </div>

    <!-- Попап обновления аватара -->
    <div class="popup popup_type_edit-avatar">
      <div class="popup__content">
        <button type="button" class="popup__close"></button>
        <h3 class="popup__title">Обновить аватар</h3>
        <form class="popup__form" name="edit-avatar" novalidate>
          <label class="popup__label">
            <input type="url" name="user-avatar" id="user-avatar" class="popup__input popup__input_type_avatar"
              placeholder="Ссылка на изображение" required />
          </label>
          <span class="popup__error" id="user-avatar-error"></span>

          <button type="submit" class="button popup__button popup__button_disabled" disabled>Сохранить</button>
        </form>
      </div>
    </div>

    <!-- Попап информации о карточке (Вариант 1) -->
    <div class="popup popup_type_info">
      <div class="popup__content popup__content_content_info">
        <button type="button" class="popup__close"></button>
        <h3 class="popup__title">Информация о карточке</h3>
        <div class="popup__info"></div>
        <h4 class="popup__subtitle">Лайкнули:</h4>
        <ul class="popup__list"></ul>
      </div>
    </div>
  </div>

  <template id="card-template">
    <li class="places__item card">
      <img class="card__image" src="" alt="" />
      <div class="card__control">
        <button type="button" class="card__control-button card__control-button_type_info"></button>
        <button type="button" class="card__control-button card__control-button_type_delete"></button>
      </div>
      <div class="card__description">
        <h2 class="card__title"></h2>
        <div class="card__likes">
          <button type="button" class="card__like-button"></button>
          <p class="card__like-count">0</p>  
        </div>
      </div>
    </li>
  </template>

  <!-- Шаблон для строки информации (ключ-значение) -->
  <template id="popup-info-definition-template">
    <div class="popup__info-item">
      <span class="popup__info-term"></span>
      <span class="popup__info-description"></span>
    </div>
  </template>

  <!-- Шаблон для элемента списка пользователей -->
  <template id="popup-info-user-preview-template">
    <li class="popup__list-item">
      <img class="popup__user-avatar" src="" alt="аватар">
      <span class="popup__user-name"></span>
    </li>
  </template>

</body>
</html>
